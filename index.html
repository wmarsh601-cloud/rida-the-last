<!DOCTYPE html>
<html>
<head>
  <title>RIDA APP</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0b1a2f 60%, #1a2950 100%);
      color: #eaf6ff;
      text-align: center;
      min-height: 100vh;
    }

    h1 {
      margin-top: 48px;
      font-size: 2.3em;
      letter-spacing: 2px;
      text-shadow: 0 0 12px #00eaff, 0 0 24px #1e90ff;
    }

    .glass {
      background: rgba(18, 34, 64, 0.55);
      border-radius: 18px;
      box-shadow: 0 4px 32px 0 rgba(0, 234, 255, 0.12), 0 1.5px 8px 0 rgba(30, 144, 255, 0.18);
      backdrop-filter: blur(12px);
      border: 1.5px solid rgba(0,234,255,0.18);
      margin: 24px auto;
      padding: 32px 24px 24px 24px;
      max-width: 350px;
      transition: box-shadow 0.2s;
    }

    .glass:hover {
      box-shadow: 0 0 24px 2px #00eaff, 0 1.5px 8px 0 #1e90ff;
    }

    .glow-btn {
      background: linear-gradient(90deg, #1e90ff 60%, #00eaff 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 12px 0;
      width: 100%;
      font-size: 1.1em;
      margin: 14px 0 0 0;
      box-shadow: 0 0 12px #00eaff, 0 0 24px #1e90ff;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .glow-btn:hover {
      background: linear-gradient(90deg, #00eaff 60%, #1e90ff 100%);
      box-shadow: 0 0 24px 4px #00eaff, 0 0 32px 2px #1e90ff;
    }

    .input-glass {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.08);
      color: #eaf6ff;
      font-size: 1em;
      box-shadow: 0 0 8px #00eaff33;
      outline: none;
      backdrop-filter: blur(4px);
      transition: box-shadow 0.2s;
    }
    .input-glass:focus {
      box-shadow: 0 0 16px #00eaff99;
    }

    .link-btn {
      background: none;
      border: none;
      color: #00eaff;
      text-decoration: underline;
      cursor: pointer;
      font-size: 1em;
      margin-top: 10px;
      margin-bottom: 0;
      padding: 0;
    }

    .form-title {
      font-size: 1.3em;
      margin-bottom: 18px;
      text-shadow: 0 0 8px #00eaff99;
    }
  </style>
</head>

<body>

  <h1>🚗 RIDA APP</h1>




  <div id="auth-container">
    <!-- LOGIN FORM -->
    <form id="login-form" class="glass" style="display:block;">
      <div class="form-title">Iniciar sesión</div>
      <input id="login-email" class="input-glass" type="email" placeholder="Email o teléfono" required />
      <input id="login-password" class="input-glass" type="password" placeholder="Contraseña" required />
      <button type="submit" class="glow-btn">Iniciar sesión</button>
      <button type="button" class="link-btn" id="show-register">Crear cuenta</button>
      <button type="button" class="link-btn" id="show-recover">¿Olvidaste tu contraseña?</button>
    </form>

    <!-- REGISTER FORM -->
    <form id="register-form" class="glass" style="display:none;">
      <div class="form-title">Crear cuenta</div>
      <input id="reg-name" class="input-glass" type="text" placeholder="Nombre" required />
      <input id="reg-email" class="input-glass" type="email" placeholder="Email" required />
      <input id="reg-phone" class="input-glass" type="tel" placeholder="Teléfono" required />
      <input id="reg-password" class="input-glass" type="password" placeholder="Contraseña" required />
      <input id="reg-password2" class="input-glass" type="password" placeholder="Confirmar contraseña" required />
      <button type="submit" class="glow-btn">Crear cuenta</button>
      <button type="button" class="link-btn" id="show-login">¿Ya tienes cuenta? Inicia sesión</button>
    </form>

    <!-- RECOVER FORM -->
    <form id="recover-form" class="glass" style="display:none;">
      <div class="form-title">Recuperar contraseña</div>
      <input id="recover-email" class="input-glass" type="email" placeholder="Email" required />
      <button type="submit" class="glow-btn">Enviar enlace de recuperación</button>
      <button type="button" class="link-btn" id="show-login2">Volver a iniciar sesión</button>
    </form>

    <div id="auth-message" style="margin:10px 0;min-height:24px;"></div>
  </div>

  <div id="app-container" style="display:none;max-width:400px;margin:32px auto 0 auto;background:#13294b;padding:24px 0 32px 0;border-radius:10px;">
    <div id="dashboard">
      <h2>Welcome, <span id="dashboard-email"></span></h2>
      <button id="client-mode-btn" style="margin:8px 4px;padding:10px 24px;border-radius:6px;border:none;background:#1e90ff;color:white;">Client Mode</button>
      <button id="driver-mode-btn" style="margin:8px 4px;padding:10px 24px;border-radius:6px;border:none;background:#28a745;color:white;">Driver Mode</button>
      <button id="marketplace-btn" style="margin:8px 4px;padding:10px 24px;border-radius:6px;border:none;background:#ffc107;color:#222;">Marketplace</button>
      <button id="logout-btn" style="margin:8px 4px;padding:10px 24px;border-radius:6px;border:none;background:#e74c3c;color:white;float:right;">Logout</button>
    </div>
    <div id="client-section" style="display:none;margin-top:24px;">
      <h3>Request Ride</h3>
      <div id="client-main">
        <button id="request-ride-btn" style="padding:12px 32px;font-size:1.1em;border-radius:6px;border:none;background:#1e90ff;color:white;margin:18px auto 0 auto;display:block;">Request Ride</button>
      </div>
      <div id="ride-status" style="margin-top:18px;font-size:1.1em;"></div>
    </div>
    <div id="driver-section" style="display:none;margin-top:24px;">
      <h3>Driver Dashboard</h3>
      <div style="margin:18px 0;">
        <button id="driver-status-btn" style="padding:10px 28px;font-size:1em;border-radius:6px;border:none;background:#28a745;color:white;">Go Online</button>
      </div>
      <div id="driver-status-label" style="margin-top:12px;font-size:1.1em;"></div>
    </div>
    <div id="marketplace-section" style="display:none;margin-top:24px;">
      <h3>Marketplace</h3>
      <ul id="marketplace-list" style="list-style:none;padding:0;margin:18px 0 0 0;">
        <li style="background:#223a5d;margin:10px auto 0 auto;padding:14px 0;border-radius:6px;max-width:260px;">Car Wash - $10</li>
        <li style="background:#223a5d;margin:10px auto 0 auto;padding:14px 0;border-radius:6px;max-width:260px;">Oil Change - $25</li>
        <li style="background:#223a5d;margin:10px auto 0 auto;padding:14px 0;border-radius:6px;max-width:260px;">Tire Service - $15</li>
      </ul>
    </div>
  </div>

  <div id="map"></div>

  <script>
    let map;

    function initMap() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          function(position) {
            const userLocation = {
              lat: position.coords.latitude,
              lng: position.coords.longitude
            };

            map = new google.maps.Map(document.getElementById("map"), {
              zoom: 15,
              center: userLocation,
            });

            new google.maps.Marker({
              position: userLocation,
              map: map,
              title: "Estás aquí"
            });

            console.log("Ubicación detectada:", userLocation);
          },

          function(error) {
            alert("No se pudo obtener tu ubicación 😢");
            console.log(error);
          }
        );
      } else {
        alert("Tu navegador no soporta geolocalización");
      }
    }
  </script>

  <!-- GOOGLE MAPS -->
  <script async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCjJHchXDupX0bJAQcIIqWZLqkpUKLuVMo&callback=initMap">
  </script>


  <!-- SUPABASE AUTH UI/LOGIC & APP FLOW -->
  <script type="module" src="./ui/lib/auth-session.js"></script>
  <script type="module" src="./ui/lib/app-flow.js"></script>
  <script type="module" src="./ui/lib/dashboard-features.js"></script>

</body>
</html>
