<!DOCTYPE html>
<html>
<head>
  <title>RIDA APP</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1a2f;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 50px;
    }

    #map {
      height: 400px;
      width: 90%;
      margin: 20px auto;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <h1>🚗 RIDA APP</h1>

  <div id="map"></div>

  <script>
    let map;

    function initMap() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          function(position) {
            const userLocation = {
              lat: position.coords.latitude,
              lng: position.coords.longitude
            };

            map = new google.maps.Map(document.getElementById("map"), {
              zoom: 15,
              center: userLocation,
            });

            new google.maps.Marker({
              position: userLocation,
              map: map,
              title: "Estás aquí"
            });

            console.log("Ubicación detectada:", userLocation);
          },

          function(error) {
            alert("No se pudo obtener tu ubicación 😢");
            console.log(error);
          }
        );
      } else {
        alert("Tu navegador no soporta geolocalización");
      }
    }
  </script>

  <!-- GOOGLE MAPS -->
  <script async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCjJHchXDupX0bJAQcIIqWZLqkpUKLuVMo&callback=initMap">
  </script>
