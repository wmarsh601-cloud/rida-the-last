<!DOCTYPE html>
<html>
<head>
  <title>RIDA APP</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1a2f;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 50px;
    }

    #map {
      height: 400px;
      width: 90%;
      margin: 20px auto;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <h1>🚗 RIDA APP</h1>



  <div id="auth-container">
    <form id="login-form" style="max-width:320px;margin:30px auto;display:block;background:#13294b;padding:24px 18px;border-radius:8px;">
      <h2>Login</h2>
      <input id="email" type="email" placeholder="Email" required style="width:90%;margin:8px 0;padding:8px;border-radius:4px;border:none;" /><br>
      <input id="password" type="password" placeholder="Password" required style="width:90%;margin:8px 0;padding:8px;border-radius:4px;border:none;" /><br>
      <button type="submit" style="width:45%;margin:8px 2%;padding:8px 0;border-radius:4px;border:none;background:#1e90ff;color:white;">Login</button>
    </form>
    <form id="register-form" style="max-width:320px;margin:0 auto 16px auto;display:block;background:#13294b;padding:18px;border-radius:8px;">
      <h2>Register</h2>
      <input id="reg-email" type="email" placeholder="Email" required style="width:90%;margin:8px 0;padding:8px;border-radius:4px;border:none;" /><br>
      <input id="reg-password" type="password" placeholder="Password" required style="width:90%;margin:8px 0;padding:8px;border-radius:4px;border:none;" /><br>
      <button type="submit" style="width:45%;margin:8px 2%;padding:8px 0;border-radius:4px;border:none;background:#28a745;color:white;">Register</button>
    </form>
    <div id="auth-message" style="margin:10px 0;min-height:24px;"></div>
  </div>

  <div id="app-container" style="display:none;max-width:400px;margin:32px auto 0 auto;background:#13294b;padding:24px 0 32px 0;border-radius:10px;">
    <div id="dashboard">
      <h2>Welcome, <span id="dashboard-email"></span></h2>
      <button id="client-mode-btn" style="margin:8px 4px;padding:10px 24px;border-radius:6px;border:none;background:#1e90ff;color:white;">Client Mode</button>
      <button id="driver-mode-btn" style="margin:8px 4px;padding:10px 24px;border-radius:6px;border:none;background:#28a745;color:white;">Driver Mode</button>
      <button id="marketplace-btn" style="margin:8px 4px;padding:10px 24px;border-radius:6px;border:none;background:#ffc107;color:#222;">Marketplace</button>
      <button id="logout-btn" style="margin:8px 4px;padding:10px 24px;border-radius:6px;border:none;background:#e74c3c;color:white;float:right;">Logout</button>
    </div>
    <div id="client-section" style="display:none;margin-top:24px;">
      <h3>Request Ride</h3>
      <p>Client mode placeholder screen.</p>
    </div>
    <div id="driver-section" style="display:none;margin-top:24px;">
      <h3>Driver Dashboard</h3>
      <p>Driver mode placeholder screen.</p>
    </div>
    <div id="marketplace-section" style="display:none;margin-top:24px;">
      <h3>Coming soon</h3>
      <p>Marketplace placeholder screen.</p>
    </div>
  </div>

  <div id="map"></div>

  <script>
    let map;

    function initMap() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          function(position) {
            const userLocation = {
              lat: position.coords.latitude,
              lng: position.coords.longitude
            };

            map = new google.maps.Map(document.getElementById("map"), {
              zoom: 15,
              center: userLocation,
            });

            new google.maps.Marker({
              position: userLocation,
              map: map,
              title: "Estás aquí"
            });

            console.log("Ubicación detectada:", userLocation);
          },

          function(error) {
            alert("No se pudo obtener tu ubicación 😢");
            console.log(error);
          }
        );
      } else {
        alert("Tu navegador no soporta geolocalización");
      }
    }
  </script>

  <!-- GOOGLE MAPS -->
  <script async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCjJHchXDupX0bJAQcIIqWZLqkpUKLuVMo&callback=initMap">
  </script>


  <!-- SUPABASE AUTH UI/LOGIC & APP FLOW -->
  <script type="module" src="./ui/lib/auth-ui.js"></script>
  <script type="module" src="./ui/lib/app-flow.js"></script>

</body>
</html>
